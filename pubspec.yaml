name: habitgardenia
description: Grow your habits, grow your garden.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1          # State management
  hive: ^2.2.3               # Local database
  hive_flutter: ^1.1.0       # Hive for Flutter
  uuid: ^4.2.1               # Unique IDs
  intl: ^0.19.0              # Date formatting
  flutter_animate: ^4.5.0    # Smooth animations
  lottie: ^3.1.0             # Lottie animations (garden life)
  table_calendar: ^3.0.9     # Habit calendar view
  fl_chart: ^0.68.0          # Streak/progress charts
  google_fonts: ^6.1.0       # Beautiful typography

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/